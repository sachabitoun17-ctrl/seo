name: Bootstrap deploy (one-off)

on:
  push:
    branches: [claude/deploy-bootstrap]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CF_T_B64: Y2Z1dF9aUzlnR0FZVVB0MFN1dkxYbWIyWVJQUVVYTHY0dnpwTFNTcER5RzNVZGYyOTczZDU=
      CF_A_B64: ZGFkZGVkMjhiMWQ5ZjU4Mjk1ZDEzNWU0MDg3NWQyZjE=
      NEXT_PUBLIC_SITE_URL: https://slowmadly.com
      NEXT_PUBLIC_SITE_NAME: Slowmadly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Decode credentials
        run: |
          echo "CLOUDFLARE_API_TOKEN=$(echo "$CF_T_B64" | base64 -d)" >> $GITHUB_ENV
          echo "CLOUDFLARE_ACCOUNT_ID=$(echo "$CF_A_B64" | base64 -d)" >> $GITHUB_ENV
      - name: Install deps
        run: npm ci --legacy-peer-deps
      - name: Build for Cloudflare Pages
        run: npx @cloudflare/next-on-pages@latest
      - name: Ensure Pages project exists
        run: |
          npx wrangler@latest pages project list 2>/dev/null | grep -q "^slowmadly " \
            || npx wrangler@latest pages project create slowmadly --production-branch=main
      - name: Deploy
        run: |
          npx wrangler@latest pages deploy .vercel/output/static \
            --project-name=slowmadly \
            --branch=main \
            --commit-hash=${GITHUB_SHA} \
            --commit-message="initial production deploy"
