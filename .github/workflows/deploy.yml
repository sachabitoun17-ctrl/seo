name: Deploy to Cloudflare Pages

on:
  push:
    branches: ['**']
  workflow_dispatch:

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  PROJECT_NAME: slowmadly

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build for Cloudflare Pages
        env:
          NEXT_PUBLIC_SITE_URL: https://slowmadly.com
          NEXT_PUBLIC_SITE_NAME: Slowmadly
          NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ secrets.NEXT_PUBLIC_CF_ANALYTICS_TOKEN }}
          NEXT_PUBLIC_AFF_SAFETYWING: ${{ secrets.NEXT_PUBLIC_AFF_SAFETYWING }}
          NEXT_PUBLIC_AFF_TRAVELPAYOUTS: ${{ secrets.NEXT_PUBLIC_AFF_TRAVELPAYOUTS }}
          NEXT_PUBLIC_AFF_VIATOR: ${{ secrets.NEXT_PUBLIC_AFF_VIATOR }}
        run: npx @cloudflare/next-on-pages@latest

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          BRANCH="${GITHUB_REF##*/}"
          npx wrangler@latest pages deploy .vercel/output/static \
            --project-name="${PROJECT_NAME}" \
            --branch="${BRANCH}" \
            --commit-hash="${GITHUB_SHA}" \
            --commit-message="${GITHUB_REF_NAME}: $(git log -1 --pretty=%s | head -c 80)"
